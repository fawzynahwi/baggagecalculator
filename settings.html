<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — BaggageCheck</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <button class="topbar-icon-btn" onclick="location.href='index.html'" title="Back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <span class="topbar-title">Settings</span>

  <button class="topbar-icon-btn" id="themeToggleBtn" title="Toggle light/dark mode">
    <svg id="iconLight" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg id="iconDark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<main class="page">

  <!-- Weight Limits -->
  <div class="settings-section">
    <div class="settings-section-title">Weight Limits</div>
    <div class="settings-card">
      <div class="settings-row">
        <div>
          <div class="settings-row-label">Checked Baggage</div>
          <div class="settings-row-sub">Per-passenger total allowance</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" class="weight-input" id="checkedLimitInput" min="1" max="99" step="0.5" value="25" />
          <span style="font-size:13px;color:var(--text-muted);font-weight:600">kg</span>
        </div>
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-row-label">Cabin Baggage</div>
          <div class="settings-row-sub">Carry-on allowance</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" class="weight-input" id="cabinLimitInput" min="1" max="30" step="0.5" value="7" />
          <span style="font-size:13px;color:var(--text-muted);font-weight:600">kg</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Dark Mode -->
  <div class="settings-section">
    <div class="settings-section-title">Display Mode</div>
    <div class="settings-card theme-options">

      <label class="theme-option">
        <input type="radio" name="theme" value="light" id="themeLight" />
        <span class="theme-radio-dot"></span>
        <div class="theme-preview light"></div>
        <div style="flex:1">
          <div class="theme-label">Light</div>
          <div class="theme-desc">Bright background for daylight use</div>
        </div>
      </label>

      <label class="theme-option">
        <input type="radio" name="theme" value="dark-grey" id="themeDarkGrey" />
        <span class="theme-radio-dot"></span>
        <div class="theme-preview dark-grey"></div>
        <div style="flex:1">
          <div class="theme-label">Dark Grey</div>
          <div class="theme-desc">Comfortable dark mode for LCD screens</div>
        </div>
      </label>

      <label class="theme-option">
        <input type="radio" name="theme" value="amoled" id="themeAmoled" />
        <span class="theme-radio-dot"></span>
        <div class="theme-preview amoled"></div>
        <div style="flex:1">
          <div class="theme-label">AMOLED Black</div>
          <div class="theme-desc">True black — saves battery on OLED screens</div>
        </div>
      </label>

    </div>
  </div>

  <!-- Accent Color -->
  <div class="settings-section">
    <div class="settings-section-title">Accent Colour</div>
    <div class="settings-card">
      <div class="accent-grid" id="accentGrid">
        <!-- Swatches injected by JS -->
      </div>
      <div class="custom-accent-row">
        <span class="custom-accent-label">Custom:</span>
        <input type="color" class="custom-accent-input" id="customAccentInput" />
        <span style="font-size:13px;color:var(--text-muted)" id="customAccentHex">#b80909</span>
      </div>
    </div>
  </div>

  <!-- Save Button -->
  <button class="save-btn" onclick="saveSettings()">Save Settings</button>

</main>

<div class="toast" id="toast"></div>

<script src="settings.js"></script>
</body>
</html>
